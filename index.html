<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEARLESS MISSION SYSTEM v8.5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+KR:wght@300;700&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --dark-blue: #004455;
            --arch-gold: #d4af37;
            --danger-red: #ff3e3e;
            --font-main: 'Orbitron', 'Noto Sans KR', sans-serif;
        }

        body {
            margin: 0; background: #050505; color: var(--neon-blue);
            font-family: var(--font-main);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding: 20px; overflow-x: hidden;
        }

        /* 컨트롤러 */
        #top-controls { margin-bottom: 20px; display: flex; gap: 15px; z-index: 5000; }
        button.hud-btn {
            background: rgba(0, 242, 255, 0.05); border: 1px solid var(--neon-blue); color: var(--neon-blue);
            padding: 10px 25px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        button.hud-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }

        /* 메인 HUD (1200x800) */
        #capture {
            width: 1200px; height: 800px; background: #000;
            position: relative; box-sizing: border-box;
            border: 2px solid var(--dark-blue);
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                radial-gradient(circle at center, #001115 0%, #000 100%);
            background-size: 30px 30px, 30px 30px, 100% 100%;
            overflow: hidden;
        }

        /* 캐릭터 패널 */
        .hologram-panel {
            position: absolute; background: rgba(0, 242, 255, 0.02);
            border: 1px solid rgba(0, 242, 255, 0.2); padding: 20px; text-align: center;
        }
        #panel-left { top: 40px; left: 40px; width: 320px; height: 460px; clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%); }
        #panel-right { bottom: 40px; right: 40px; width: 320px; height: 460px; clip-path: polygon(10% 0, 100% 0, 100% 100%, 0 100%, 0 10%); }

        .photo-frame {
            width: 240px; height: 240px; border: 1px solid var(--neon-blue);
            background: url('「Fearless」 Symbol Logo White Ver.png') no-repeat center / 40% #0a0a0a;
            background-size: cover; margin: 0 auto 15px; box-shadow: 0 0 15px rgba(0,242,255,0.2);
        }

        .role-tag { font-size: 11px; letter-spacing: 3px; color: var(--arch-gold); margin-bottom: 5px; font-weight: bold; }
        .name-display { font-size: 26px; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--neon-blue); border-bottom: 1px solid var(--neon-blue); padding-bottom: 5px; margin-bottom: 15px; }

        /* 중앙 스크린 */
        #center-core {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 540px; text-align: center; z-index: 10;
        }
        #screen {
            width: 500px; height: 320px; margin: 0 auto; text-align: left;
            font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: #eee;
            border-left: 3px solid var(--neon-blue); padding: 15px;
            background: rgba(0,0,0,0.7); overflow-y: hidden; line-height: 1.6;
            border-right: 1px solid rgba(0, 242, 255, 0.1);
        }
        .line { margin-bottom: 6px; }
        .warning { color: var(--danger-red); font-weight: bold; text-shadow: 0 0 8px #ff0000; }
        .glitch { animation: glitch 0.2s infinite; color: var(--danger-red); }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-3px, 2px); } 40% { transform: translate(-3px, -2px); } 60% { transform: translate(3px, 2px); } 80% { transform: translate(3px, -2px); } 100% { transform: translate(0); } }

        /* 상태 UI */
        #comm { position: absolute; top: 20px; right: 20px; font-size: 12px; color: var(--arch-gold); }
        #status-display { position: absolute; bottom: 20px; left: 20px; text-align: left; font-size: 11px; color: rgba(0, 242, 255, 0.6); line-height: 1.5; }

        /* 선택지 */
        .choice-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .choice-row { display: flex; gap: 15px; }
        .choice-btn { 
            background: #000; border: 1px solid var(--neon-blue); color: #fff; 
            padding: 8px 20px; cursor: pointer; font-size: 13px; font-family: 'Orbitron', 'Noto Sans KR';
            transition: 0.2s;
        }
        .choice-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 10px var(--neon-blue); }

        /* 입력 UI 하단 */
        #lower-ui { width: 1200px; margin-top: 20px; background: rgba(255,255,255,0.03); padding: 25px; border: 1px solid #333; box-sizing: border-box; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        input[type=text], textarea { background: #111; border: 1px solid #444; color: #fff; padding: 10px; outline: none; }
        textarea { width: 100%; height: 180px; color: var(--neon-blue); margin-top: 10px; resize: none; font-size: 12px; }
    </style>
</head>
<body>

<div id="top-controls">
    <button class="hud-btn" id="mainStartBtn" onclick="startMission()">MISSION START</button>
    <button class="hud-btn" onclick="saveImage()">📸 SAVE IMAGE</button>
</div>

<div id="capture">
    <div id="comm"></div>
    <div id="status-display"></div>

    <div id="panel-left" class="hologram-panel">
        <div class="photo-frame" id="char1"></div>
        <div class="role-tag">SENTINEL</div>
        <div class="name-display" id="outName1">FEARLESS_S</div>
        <div style="font-size:10px; text-align:left; opacity:0.7;">STABILITY [||||||....] 62%</div>
    </div>

    <div id="center-core">
        <div id="screen"></div>
        <div id="choice-area" class="choice-container"></div>
    </div>

    <div id="panel-right" class="hologram-panel">
        <div class="photo-frame" id="char2"></div>
        <div class="role-tag">GUIDE</div>
        <div class="name-display" id="outName2">FEARLESS_G</div>
        <div style="font-size:10px; text-align:left; opacity:0.7;">RESONANCE [||||||||..] 88%</div>
    </div>
</div>

<div id="lower-ui">
    <div class="input-row">
        <div class="input-group">
            <label style="font-size:11px; color:var(--arch-gold);">SENTINEL NAME</label>
            <input type="text" id="name1" placeholder="이름 입력" oninput="syncName(1)">
            <input type="file" id="file1">
        </div>
        <div class="input-group">
            <label style="font-size:11px; color:var(--arch-gold);">GUIDE NAME</label>
            <input type="text" id="name2" placeholder="이름 입력" oninput="syncName(2)">
            <input type="file" id="file2">
        </div>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="hud-btn" onclick="generateOOC()">GENERATE OOC</button>
        <button class="hud-btn" onclick="copyOOC()">📋 COPY</button>
    </div>
    <textarea id="oocBox" readonly></textarea>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
    function syncName(id) {
        const val = document.getElementById('name' + id).value;
        document.getElementById('outName' + id).innerText = val.toUpperCase() || (id === 1 ? 'SENTINEL' : 'GUIDE');
    }

    file1.onchange = e => { if(e.target.files[0]) char1.style.backgroundImage = `url(${URL.createObjectURL(e.target.files[0])})`; };
    file2.onchange = e => { if(e.target.files[0]) char2.style.backgroundImage = `url(${URL.createObjectURL(e.target.files[0])})`; };

    async function type(text, type = 'normal') {
        const div = document.createElement("div");
        div.className = "line";
        if(type === 'warning') div.classList.add('warning');
        if(type === 'glitch') div.classList.add('glitch');
        document.getElementById('screen').appendChild(div);
        
        for(let i=0; i<text.length; i++) {
            div.innerText += text[i];
            await new Promise(r => setTimeout(r, 20));
        }
    }

    let currentLoc = "";

    async function startMission() {
        const screen = document.getElementById('screen');
        const choiceArea = document.getElementById('choice-area');
        screen.innerHTML = ""; choiceArea.innerHTML = "";
        
        // 오류 연출 강화
        await type("SYSTEM_REBOOTING...", "glitch");
        await type("CAUTION: UNSTABLE DIMENSIONAL VORTEX DETECTED.", "warning");
        await type("> ACCESSING FEARLESS KOREA DATABASE...");
        
        const locs = ["노원·도봉 폐상가 구역", "강남 코엑스 지하 균열", "여의도 벙커 유적", "잠실 S급 개체 출현지"];
        currentLoc = locs[Math.floor(Math.random()*locs.length)];

        await type(`> MISSION_LOC: ${currentLoc}`);
        await type("> [INFO] 차원문 안정화 및 유출 개체 처리 시작.");
        
        // 무작위 시스템 오류 텍스트
        if(Math.random() > 0.3) await type("ERROR: SYNCHR█NIZATION ERR█R", "glitch");
        if(Math.random() > 0.5) await type("[CRITICAL] 센티넬 감각 과부하 위험 수치 도달", "warning");

        updateStatus();
        showChoices();
    }

    function updateStatus() {
        const heart = Math.floor(Math.random()*40 + 90);
        const sanity = Math.floor(Math.random()*100);
        document.getElementById('status-display').innerHTML = 
            `심박수: ${heart} BPM<br>감각 부하: ${sanity > 70 ? 'CRITICAL' : 'STABLE'}<br>동기화율: ${sanity}%`;
        document.getElementById('comm').innerText = `[HQ] ${Math.random()>0.5?'지원 병력 대기 중':'상황 보고 요망'}`;
    }

    function showChoices() {
        const area = document.getElementById('choice-area');
        const row = document.createElement("div");
        row.className = "choice-row";

        const btn1 = document.createElement("button");
        btn1.className = "choice-btn"; btn1.innerText = "안정화 시도";
        btn1.onclick = () => handleResult('stabilize');

        const btn2 = document.createElement("button");
        btn2.className = "choice-btn"; btn2.innerText = "강행 돌파";
        btn2.onclick = () => handleResult('force');

        row.appendChild(btn1); row.appendChild(btn2);
        area.appendChild(row);
    }

    async function handleResult(typeCode) {
        document.getElementById('choice-area').innerHTML = "";
        const screen = document.getElementById('screen');
        
        const results = {
            stabilize: [
                { txt: ">> 성공: 차원문이 안전하게 폐쇄되었습니다. 페어 전원 무사 귀환.", warn: false },
                { txt: ">> 실패: 안정화 장치 역류. 가이드의 정신적 피로도가 급증합니다.", warn: true },
                { txt: ">> 부분 성공: 균열은 닫혔으나 잔류 에너지가 지역에 고착되었습니다.", warn: false }
            ],
            force: [
                { txt: ">> 성공: 압도적인 화력으로 개체를 섬멸했습니다. 센티넬 폭주 지수 상승.", warn: true },
                { txt: ">> 실패: 개체 포위망 돌파 불가. 긴급 후퇴 프로토콜 발동.", warn: true },
                { txt: ">> 미션 완수: 목표 도달 성공. 단, 센티넬이 일시적 실명 상태에 빠집니다.", warn: true }
            ]
        };

        const pick = results[typeCode][Math.floor(Math.random() * results[typeCode].length)];
        await type("...ANALYZING OUTCOME...", "glitch");
        await type(pick.txt, pick.warn ? 'warning' : 'normal');

        // 추가 임무 버튼 생성
        const nextBtn = document.createElement("button");
        nextBtn.className = "hud-btn";
        nextBtn.style.marginTop = "15px";
        nextBtn.innerText = "NEXT MISSION START";
        nextBtn.onclick = startMission;
        document.getElementById('choice-area').appendChild(nextBtn);
    }

    function generateOOC() {
        const sName = document.getElementById('name1').value || "센티넬";
        const gName = document.getElementById('name2').value || "가이드";
        const ooc = `*[OOC: 세션 정보 업데이트\n\n지점: ${currentLoc}\n투입 인원: ${sName}(S), ${gName}(G)\n상황: 차원 파동 간섭으로 인한 가이딩 불확실성 증대. 폐상가 골목에서의 기습 위험 존재.\n\n위 데이터를 기반으로 RP를 진행합니다.]*`;
        document.getElementById('oocBox').value = ooc;
    }

    function copyOOC() { oocBox.select(); document.execCommand("copy"); alert("OOC 복사 완료"); }

    async function saveImage() {
        const lower = document.getElementById('lower-ui');
        const top = document.getElementById('top-controls');
        lower.style.display = 'none'; top.style.display = 'none';
        const canvas = await html2canvas(document.getElementById('capture'), { scale: 2, backgroundColor: "#000" });
        const link = document.createElement("a");
        link.download = "FEARLESS_LOG.png";
        link.href = canvas.toDataURL();
        link.click();
        lower.style.display = 'block'; top.style.display = 'flex';
    }
</script>

</body>
</html>
