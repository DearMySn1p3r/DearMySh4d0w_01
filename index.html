<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEARLESS MISSION SYSTEM v8.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+KR:wght@300;700&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --dark-blue: #004455;
            --arch-gold: #d4af37;
            --font-main: 'Orbitron', 'Noto Sans KR', sans-serif;
        }

        body {
            margin: 0; background: #050505; color: var(--neon-blue);
            font-family: var(--font-main);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding: 20px; overflow-x: hidden;
        }

        /* 컨트롤러 */
        #top-controls { margin-bottom: 20px; display: flex; gap: 15px; z-index: 5000; }
        button.hud-btn {
            background: rgba(0, 242, 255, 0.05); border: 1px solid var(--neon-blue); color: var(--neon-blue);
            padding: 10px 25px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        button.hud-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }

        /* 메인 HUD (1200x800) */
        #capture {
            width: 1200px; height: 800px; background: #000;
            position: relative; box-sizing: border-box;
            border: 2px solid var(--dark-blue);
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                radial-gradient(circle at center, #001115 0%, #000 100%);
            background-size: 30px 30px, 30px 30px, 100% 100%;
            overflow: hidden;
        }

        /* 캐릭터 패널 */
        .hologram-panel {
            position: absolute; background: rgba(0, 242, 255, 0.02);
            border: 1px solid rgba(0, 242, 255, 0.2); padding: 20px; text-align: center;
        }
        #panel-left { top: 40px; left: 40px; width: 320px; height: 460px; clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%); }
        #panel-right { bottom: 40px; right: 40px; width: 320px; height: 460px; clip-path: polygon(10% 0, 100% 0, 100% 100%, 0 100%, 0 10%); }

        .photo-frame {
            width: 240px; height: 240px; border: 1px solid var(--neon-blue);
            background: url('「Fearless」 Symbol Logo White Ver.png') no-repeat center / 40% #0a0a0a;
            background-size: cover; margin: 0 auto 15px; box-shadow: 0 0 15px rgba(0,242,255,0.2);
        }

        .role-tag { font-size: 11px; letter-spacing: 3px; color: var(--arch-gold); margin-bottom: 5px; font-weight: bold; }
        .name-display { font-size: 26px; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--neon-blue); border-bottom: 1px solid var(--neon-blue); padding-bottom: 5px; margin-bottom: 15px; }

        /* 상태 바 */
        .stat-row { font-size: 12px; text-align: left; margin-bottom: 5px; color: #aaa; }
        .stat-bar { width: 100%; height: 4px; background: #222; margin-top: 2px; position: relative; }
        .stat-fill { height: 100%; background: var(--neon-blue); box-shadow: 0 0 5px var(--neon-blue); }

        /* 중앙 스크린 */
        #center-core {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; text-align: center; z-index: 10;
        }
        #screen {
            width: 460px; height: 280px; margin: 0 auto; text-align: left;
            font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: #eee;
            border-left: 3px solid var(--neon-blue); padding: 15px;
            background: rgba(0,0,0,0.6); overflow-y: hidden; line-height: 1.6;
        }
        .line { margin-bottom: 6px; }
        .warning { color: #ff3e3e; font-weight: bold; text-shadow: 0 0 8px #ff0000; }
        .glitch { animation: glitch 0.2s infinite; }
        @keyframes glitch { 0% { transform: translate(0); } 50% { transform: translate(-2px, 1px); } 100% { transform: translate(2px, -1px); } }

        /* 통신 및 로고 */
        #comm { position: absolute; top: 20px; right: 20px; font-size: 12px; color: var(--arch-gold); letter-spacing: 1px; }
        .center-logo { width: 120px; opacity: 0.5; margin-bottom: 20px; }

        /* 하단 입력 UI */
        #lower-ui { width: 1200px; margin-top: 20px; background: rgba(255,255,255,0.03); padding: 25px; border: 1px solid #333; box-sizing: border-box; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 12px; color: var(--arch-gold); font-weight: bold; }
        input[type=text], textarea { background: #111; border: 1px solid #444; color: #fff; padding: 10px; font-family: inherit; outline: none; }
        input:focus { border-color: var(--neon-blue); }
        textarea { width: 100%; height: 200px; font-size: 13px; color: var(--neon-blue); margin-top: 10px; resize: none; }

        /* 선택지 */
        .choice { margin-top: 15px; display: flex; gap: 10px; }
        .choice-btn { background: #000; border: 1px solid #fff; color: #fff; padding: 5px 15px; cursor: pointer; font-size: 12px; }
        .choice-btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

<div id="top-controls">
    <button class="hud-btn" onclick="startMission()">MISSION START</button>
    <button class="hud-btn" onclick="saveImage()">📸 SAVE IMAGE</button>
</div>

<div id="capture">
    <div id="comm"></div>

    <div id="panel-left" class="hologram-panel">
        <div class="photo-frame" id="char1"></div>
        <div class="role-tag">SENTINEL</div>
        <div class="name-display" id="outName1">UNKNOWN</div>
        <div class="stat-row">PSYCHIC STABILITY
            <div class="stat-bar"><div class="stat-fill" style="width: 45%;"></div></div>
        </div>
        <div class="stat-row">SENSORY OVERLOAD
            <div class="stat-bar"><div class="stat-fill" style="width: 78%; background: #f33;"></div></div>
        </div>
    </div>

    <div id="center-core">
        <img src="「Fearless」 Symbol Logo White Ver.png" class="center-logo">
        <div id="screen"></div>
    </div>

    <div id="panel-right" class="hologram-panel">
        <div class="photo-frame" id="char2"></div>
        <div class="role-tag">GUIDE</div>
        <div class="name-display" id="outName2">UNKNOWN</div>
        <div class="stat-row">GUIDING OUTPUT
            <div class="stat-bar"><div class="stat-fill" style="width: 92%;"></div></div>
        </div>
        <div class="stat-row">SYNC RESONANCE
            <div class="stat-bar"><div class="stat-fill" style="width: 65%; background: var(--arch-gold);"></div></div>
        </div>
    </div>
</div>

<div id="lower-ui">
    <div class="input-row">
        <div class="input-group">
            <label>SENTINEL NAME</label>
            <input type="text" id="name1" placeholder="센티넬 이름" oninput="syncName(1)">
            <input type="file" id="file1">
        </div>
        <div class="input-group">
            <label>GUIDE NAME</label>
            <input type="text" id="name2" placeholder="가이드 이름" oninput="syncName(2)">
            <input type="file" id="file2">
        </div>
    </div>
    
    <div style="display:flex; gap:10px;">
        <button class="hud-btn" onclick="generateOOC()">GENERATE OOC REPORT</button>
        <button class="hud-btn" onclick="copyOOC()">📋 COPY</button>
    </div>
    <textarea id="oocBox" readonly></textarea>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
    function syncName(id) {
        const val = document.getElementById('name' + id).value;
        document.getElementById('outName' + id).innerText = val.toUpperCase() || (id === 1 ? 'SENTINEL' : 'GUIDE');
    }

    file1.onchange = e => { if(e.target.files[0]) char1.style.backgroundImage = `url(${URL.createObjectURL(e.target.files[0])})`; };
    file2.onchange = e => { if(e.target.files[0]) char2.style.backgroundImage = `url(${URL.createObjectURL(e.target.files[0])})`; };

    async function type(text, isWarning = false) {
        const div = document.createElement("div");
        div.className = isWarning ? "line warning" : "line";
        document.getElementById('screen').appendChild(div);
        for(let i=0; i<text.length; i++) {
            div.innerText += text[i];
            await new Promise(r => setTimeout(r, 20));
        }
    }

    let currentMission = "";

    async function startMission() {
        const screen = document.getElementById('screen');
        screen.innerHTML = "";
        
        const locs = ["노원·도봉 인근 폐상가 구역", "강남역 차원 균열 접점", "잠실 고층지대 폐쇄로", "여의도 지하 벙커 유적"];
        currentMission = locs[Math.floor(Math.random()*locs.length)];

        commMsg();
        await type("> 시스템 접속 중... 접근 권한 승인.");
        await type(`> 현장 분석: ${currentMission}`);
        await type("> [경고] 저위험~중위험급 개체 유출 확인.", true);
        await type("> 목표: 차원문 안정화 및 잔류 에너지 정리.");
        
        if(Math.random() > 0.5) {
            const g = document.createElement("div");
            g.className = "line glitch";
            g.innerText = ">> SYNCHR█NIZATION ERR█R DETECTED";
            screen.appendChild(g);
            await type("[ALERT] 감정 동기화 수치 임계점 도달.", true);
        }

        showChoices();
    }

    function commMsg() {
        const msgs = ["[CONTROL] 상황 보고 바람", "[HQ] 가이드 출력 유지할 것", "[?] 들리나... 응답하라"];
        document.getElementById('comm').innerText = msgs[Math.floor(Math.random()*msgs.length)];
    }

    function showChoices() {
        const box = document.createElement("div");
        box.className = "choice";
        const btn1 = document.createElement("button");
        btn1.className = "choice-btn"; btn1.innerText = "안정화 시도";
        btn1.onclick = () => type(">> 결과: 차원문 폐쇄 성공. 페어 전원 무사 귀환.");
        
        const btn2 = document.createElement("button");
        btn2.className = "choice-btn"; btn2.innerText = "강행 돌파";
        btn2.onclick = () => type(">> 결과: 임무 완수. 단, 센티넬 정신 잠식 심화.", true);

        box.appendChild(btn1); box.appendChild(btn2);
        document.getElementById('screen').appendChild(box);
    }

    function generateOOC() {
        const sName = document.getElementById('name1').value || "센티넬";
        const gName = document.getElementById('name2').value || "가이드";
        const keywords = ["잠식", "공명", "낙인", "결속", "붕괴"];
        
        const ooc = `*[OOC: 새로운 세션 시작.

■ 작전 지역: ${currentMission || "서울 동북권 통제 구역"}
■ 주요 목표: 차원문 안정화 / 유출 개체 처리 / 잔류 에너지 정리

■ 상황 브리핑
현재 해당 지역은 소형 차원문 이상 반응으로 인해 임시 통제 구역으로 지정되었습니다. 불안정한 균열 형태에서 중위험급 개체가 유출되고 있으며, 센티넬(${sName})은 전투 지속으로 인해 감각 과부하 위험이 누적된 상태입니다.

가이드(${gName})는 이를 억제해야 하나, 차원문 인근의 파동으로 인해 가이드 능력 또한 간섭을 받아 불안정하게 작용합니다. 폐상가 밀집 구역의 복잡한 구조 속에서 감정 왜곡 현상을 이겨내며 임무를 수행해야 합니다.

키워드: 『${keywords[Math.floor(Math.random()*keywords.length)]}』

위 상황을 바탕으로 RP를 시작합니다. ]*`;

        document.getElementById('oocBox').value = ooc;
    }

    function copyOOC() {
        const box = document.getElementById('oocBox');
        box.select(); document.execCommand("copy");
        alert("OOC 리포트가 복사되었습니다.");
    }

    async function saveImage() {
        const lower = document.getElementById('lower-ui');
        const top = document.getElementById('top-controls');
        lower.style.display = 'none'; top.style.display = 'none';

        const canvas = await html2canvas(document.getElementById('capture'), {
            scale: 2, backgroundColor: "#000", useCORS: true,
            width: 1200, height: 800
        });

        const link = document.createElement("a");
        link.download = "FEARLESS_MISSION_REPORT.png";
        link.href = canvas.toDataURL();
        link.click();

        lower.style.display = 'block'; top.style.display = 'flex';
    }
</script>

</body>
</html>
